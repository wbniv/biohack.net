name: Deploy site

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check links
        run: node scripts/check-links.js --skip-external --dir .

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CF_PAGES_ACCOUNT_ID }}
          command: pages deploy . --project-name biohack-net --branch master
