version: '3'

includes:
  shared:
    taskfile: ../python-tui-lib/Taskfile.shared.yml
    optional: true
    flatten: true

tasks:
  dev:
    desc: Start Astro dev server
    cmds:
      - pnpm dev

  build:
    desc: Build site to dist/
    cmds:
      - pnpm build

  preview:
    desc: Preview built site
    cmds:
      - pnpm preview

  check-links:
    desc: Check internal links in built site
    deps: [build]
    cmds:
      - node scripts/check-links.js --skip-external --dir dist

  lighthouse:
    desc: "Run Lighthouse against every routable prod page, RUNS=${RUNS:-3} runs each, devtools throttling. CI passes RUNS=1. Reports under /tmp/lh/latest/."
    cmds:
      - |
        set -euo pipefail
        mkdir -p /tmp/lh/latest
        RUNS=${RUNS:-3}

        # Routable pages. Extend this list as the site grows.
        URLS=(
          "https://biohack.net/|home"
          "https://biohack.net/claude/|claude"
          "https://biohack.net/cv/|cv"
        )
        SLUGS=(); for pair in "${URLS[@]}"; do SLUGS+=( "${pair#*|}" ); done

        for pair in "${URLS[@]}"; do
          URL="${pair%|*}"; SLUG="${pair#*|}"
          for RUN in $(seq 1 "$RUNS"); do
            TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "[$TS] === ${SLUG} run ${RUN} ==="
            npx --yes lighthouse@13.3.0 "$URL" \
              --form-factor=mobile \
              --throttling-method=devtools \
              --chrome-flags="--headless=new --no-sandbox --disable-gpu" \
              --quiet --output=json \
              --output-path="/tmp/lh/latest/${SLUG}.run-${RUN}.report.json"
          done
        done
        echo
        echo "=== devtools / n=${RUNS} / scores per run ==="
        printf "%-30s %-3s %-4s %-4s %-4s %-5s %-6s %-5s %s\n" "page" "run" "perf" "a11y" "bp" "fcp" "lcp" "tbt" "cls"
        for SLUG in "${SLUGS[@]}"; do
          for RUN in $(seq 1 "$RUNS"); do
            jq -r --arg slug "$SLUG" --arg run "$RUN" '
              [$slug, $run,
               (.categories.performance.score*100|round|tostring),
               (.categories.accessibility.score*100|round|tostring),
               (.categories["best-practices"].score*100|round|tostring),
               .audits["first-contentful-paint"].displayValue,
               .audits["largest-contentful-paint"].displayValue,
               .audits["total-blocking-time"].displayValue,
               .audits["cumulative-layout-shift"].displayValue
              ] | @tsv' "/tmp/lh/latest/${SLUG}.run-${RUN}.report.json"
          done
        done | column -t -s $'\t'
        echo
        if [ "$RUNS" -gt 1 ]; then
          echo "=== Perf medians (n=${RUNS}) ==="
        else
          echo "=== Perf scores (n=1) ==="
        fi
        for SLUG in "${SLUGS[@]}"; do
          PERF=()
          for RUN in $(seq 1 "$RUNS"); do
            PERF+=( "$(jq -r '(.categories.performance.score*100)|round' \
              /tmp/lh/latest/${SLUG}.run-${RUN}.report.json)" )
          done
          MED=$(printf '%s\n' "${PERF[@]}" | sort -n | sed -n $(( (RUNS + 1) / 2 ))p)
          printf "  %-30s  %d\n" "$SLUG" "$MED"
        done

  publish:
    desc: 'Tag and push to trigger deploy (usage: task publish TAG=v1.2.3)'
    vars:
      TAG: '{{.TAG}}'
    preconditions:
      - sh: '[ -n "{{.TAG}}" ]'
        msg: "Usage: task publish TAG=v1.2.3"
    cmds:
      - git tag {{.TAG}}
      - git push origin master {{.TAG}}

  bump:
    desc: Auto-increment patch version, tag, and push to trigger deploy
    cmds:
      - |
        set -euo pipefail
        latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
        if [ -z "$latest" ]; then
          next="v0.0.1"
        else
          IFS='.' read -r major minor patch <<< "${latest#v}"
          next="v${major}.${minor}.$((patch + 1))"
        fi
        echo "Bumping ${latest:-<none>} -> $next"
        git tag "$next"
        git push origin master "$next"
